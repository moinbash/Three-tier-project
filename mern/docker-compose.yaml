services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    networks: 
      - mern
    depends_on: 
      - backend

  backend:
    build: ./backend
    ports:
      - "5050:5050"
    networks:
      - mern
    depends_on:
      - mongodb
  
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - mern
    volumes:
      - mongo-data:/data/db
    

volumes:
  mongo-data: 
networks:
  mern:
    driver: bridge
